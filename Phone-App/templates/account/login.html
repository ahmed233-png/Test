{% extends 'pages/base.html' %}
 {% block title %}Login-New-User | Page{% endblock  %} 
{% block body %} 
<main>
<section class="container" style="margin-top: 100px">
    <div class="row justify-content-center mb-5">
        <div class="col-md-6">
            <div class="card mt-3 shadow bg-light">
                <div class="card-body">
                    <div class="text-center">
                      <h1 class="card-title border-bottom p-2 m-3"> User Login Form</h1>
                      {% include 'pages/messages.html' %}
                    </div>
                    <form method="post" action="#" autocomplete="off">
                        {% csrf_token %} 
                        <div class="mb-3">
                            <input type="text" placeholder="Enter Your Name" name="username" maxlength="100" class="form-control"/>
                        </div>
                        <br>
                                <div class="mb-3">
                                    <input type="password" placeholder="Enter Your Password" name="password" class="form-control" maxlength="8"/>
                                </div>
                                <div class="mb-3">
                                    <div class="d-grid gap-2">
                                        <button type="submit" class="btn btn-outline-primary">
                                  Login Now 
                                </button>
                              </div>
                        </div>
                    </form>
              </div>
        </div>
    </div> 
</section>
</main>
{% endblock  %}
