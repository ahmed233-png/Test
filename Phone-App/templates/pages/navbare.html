{% load static %}
<img src="{% static 'img/header_bg.jpg' %}" class="rounded float-end my-img" alt="banner"/>
<div style="clear: both;"></div>
<!--      Start Nav  -->
<nav class="navbar navbar-expand-lg  navbar-primary bg-primary">
    <div class="container">
      <a class="navbar-brand text-light" href="{% url 'home' %}"><i class="fa fa-cart-plus"></i> Ahmed-Store</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
        <div class="navbar-nav ms-auto">
            {% if request.user.is_authenticated %}
          <a class="nav-link text-light" aria-current="page" href="{% url 'home' %}"><i class="fa fa-home"></i> Home</a>
          <a class="nav-link text-light" href="{% url 'all' %}"><i class="fa fa-cubes"></i> Products</a>
          <a class="nav-link text-light" href="{% url 'cart' %}"><i class="fa fa-shopping-cart"></i> Cart</a>
            <a class="nav-link text-light" aria-current="page" href="#"><i class="fa fa-user"></i> {{request.user}}</a>
            <a class="nav-link text-light" aria-current="page" href="{% url 'user-logout' %}"><i class="fa fa-sign-out"></i> Logout</a>
            {% else %}
            <a class="nav-link text-light" href="{% url 'login' %}"><i class="fa fa-sign-in"></i> Login</a>
            <a class="nav-link text-light" href="{% url 'create-user' %}"><i class="fa fa-users"></i> Register</a>
            {% endif %}
        </div>
      </div>
    </div>
  </nav>
<!--      End  Nav  -->
